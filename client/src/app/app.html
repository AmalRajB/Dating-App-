<div class="card bg-white w-1/2 mx-auto shadow-xl p-10 mt-10">
    <h3 class="font-bold underline mb-3 uppercase">{{title}}</h3>
    <ul class="list">

        @for (member of members(); track member.id) {

        <li class="list-row items-center">
            <img src="/userprofile.avif" alt="user profile" class="size-14 rounded-box">
            <div>
                {{member.displayname}}
            </div>
        </li>
        }
    </ul>

</div>
